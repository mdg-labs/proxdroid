name: proxdroid
description: "A modern, open-source Android client for Proxmox Virtual Environment (PVE)."
publish_to: 'none'
version: 1.0.0-beta.17+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP
  dio: ^5.8.0+1

  # Data models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Storage
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.2.0
  flutter_secure_storage: ^9.2.4

  # Charts
  fl_chart: ^0.70.2

  # Utilities
  crypto: ^3.0.6
  uuid: ^4.5.1
  connectivity_plus: ^6.1.3
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1
  intl: ^0.20.0

  # Localization
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/proxdroid_icon_foreground.png

flutter_launcher_icons:
  android: true
  ios: true
  # PNG sources only (package does not support SVG). See assets/icon/README.md.
  image_path: assets/icon/proxdroid_launcher_icon.png
  # Solid color adaptive background — matches launcher SVG fill #0D1117; use a PNG path instead if you want a bitmap background.
  adaptive_icon_background: '#0D1117'
  adaptive_icon_foreground: assets/icon/proxdroid_icon_foreground.png
  min_sdk_android: 26
