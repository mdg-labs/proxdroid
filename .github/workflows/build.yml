# Release APK on prerelease-style tags only. Uses GITHUB_TOKEN (default) with contents: write.
# Stable semver tags like v1.0.0 do NOT match — a separate prod release workflow can be added later.
# If you ever need a draft release first, set draft: true on softprops/action-gh-release.

name: Build release APK

on:
  push:
    tags:
      # Beta prerelease tags only (e.g. v0.1.0-beta.1).
      - 'v*-beta*'

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter gen-l10n

      - name: Configure Android release signing
        working-directory: ${{ github.workspace }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "::error::Add repository secrets: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_PASSWORD, KEY_ALIAS. See docs/Android_release_signing.md"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > android/proxdroid-release.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=proxdroid-release.jks\n' \
            "$KEYSTORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" > android/key.properties

      - run: flutter build apk --release

      # Friendly asset name: proxdroid-<tag>.apk (matches git tag, e.g. proxdroid-v1.0.0-beta.1.apk).
      - name: Name release APK
        run: cp build/app/outputs/flutter-apk/app-release.apk "proxdroid-${{ github.ref_name }}.apk"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: proxdroid-${{ github.ref_name }}.apk
