# Release workflow: on every push to `beta` or `main`, or manual run (pick branch in the form).
# Gate compares `pubspec.yaml` version to remote tags and branch rules; build/tag/release only when needed.
# Beta → pre-release + commits since last tag. Main → draft (latest on publish) + aggregated beta notes.

name: Build release APK

on:
  push:
    branches: [beta, main]
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to check out, gate, and (if needed) build/tag from
        type: choice
        options:
          - beta
          - main
        default: beta
        required: true

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/heads/{0}', inputs.branch) || github.ref }}

      - name: Gate — version, branch rules, remote tag
        id: gate
        env:
          GATE_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//; s/+.*//')
          TAG="v${VERSION}"
          BRANCH="${GATE_BRANCH}"
          SHOULD_BUILD=false
          RELEASE_KIND=""

          if [ "$BRANCH" = "beta" ]; then
            if ! echo "$VERSION" | grep -q -- '-beta'; then
              echo "::notice::Branch beta but version has no -beta suffix; skipping."
            elif git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
              echo "::notice::Tag ${TAG} already exists; skipping."
            else
              SHOULD_BUILD=true
              RELEASE_KIND=beta
            fi
          elif [ "$BRANCH" = "main" ]; then
            if echo "$VERSION" | grep -q -- '-beta'; then
              echo "::notice::Branch main but version still contains -beta; skipping."
            elif git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
              echo "::notice::Tag ${TAG} already exists; skipping."
            else
              SHOULD_BUILD=true
              RELEASE_KIND=stable
            fi
          else
            echo "::notice::Unexpected branch ${BRANCH}; skipping."
          fi

          {
            echo "should_build=${SHOULD_BUILD}"
            echo "release_kind=${RELEASE_KIND}"
            echo "version=${VERSION}"
            echo "tag=${TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Flutter
        if: steps.gate.outputs.should_build == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable

      - if: steps.gate.outputs.should_build == 'true'
        run: flutter pub get
      - if: steps.gate.outputs.should_build == 'true'
        run: dart run build_runner build --delete-conflicting-outputs
      - if: steps.gate.outputs.should_build == 'true'
        run: flutter gen-l10n

      - name: Configure Android release signing
        if: steps.gate.outputs.should_build == 'true'
        working-directory: ${{ github.workspace }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "::error::Add repository secrets: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_PASSWORD, KEY_ALIAS. See docs/Android_release_signing.md"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > android/proxdroid-release.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=proxdroid-release.jks\n' \
            "$KEYSTORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" > android/key.properties

      - if: steps.gate.outputs.should_build == 'true'
        run: |
          flutter build apk --release --obfuscate --split-debug-info=build/app/debug-info

      - name: Upload Dart split debug info (symbolication)
        if: steps.gate.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dart-debug-info-${{ steps.gate.outputs.tag }}
          path: build/app/debug-info
          retention-days: 90

      - name: Name release APK
        if: steps.gate.outputs.should_build == 'true'
        run: cp build/app/outputs/flutter-apk/app-release.apk "proxdroid-${{ steps.gate.outputs.tag }}.apk"

      - name: Beta release notes (commits since last tag)
        id: notes_beta
        if: steps.gate.outputs.should_build == 'true' && steps.gate.outputs.release_kind == 'beta'
        run: |
          set -euo pipefail
          NOTES_FILE="$RUNNER_TEMP/release_notes.md"
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$LAST_TAG" ]; then
            git log "${LAST_TAG}..HEAD" --pretty="- %s (%h)" > "$NOTES_FILE"
          else
            git log HEAD --pretty="- %s (%h)" > "$NOTES_FILE"
          fi
          echo "path=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Stable release notes (aggregate beta pre-releases)
        id: notes_stable
        if: steps.gate.outputs.should_build == 'true' && steps.gate.outputs.release_kind == 'stable'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NOTES_FILE="$RUNNER_TEMP/release_notes.md"
          : > "$NOTES_FILE"

          # Only tags reachable from this branch (avoids a newer stable on another branch).
          PREV_STABLE=$(git tag --list 'v*' --merged HEAD --sort=-version:refname | grep -v -- '-beta' | head -1 || true)

          # All beta tags merged into HEAD, semver order (oldest first). When there is no prior
          # stable tag yet (first stable release), PREV_STABLE is empty and every merged beta tag
          # is included. When PREV_STABLE is set, only betas whose commits come after that stable.
          mapfile -t ALL_BETA_SORTED < <(git tag -l 'v*-beta*' --merged HEAD --sort=version:refname)
          BETA_TAGS=()
          for t in "${ALL_BETA_SORTED[@]}"; do
            if [ -z "$PREV_STABLE" ]; then
              BETA_TAGS+=("$t")
            elif git merge-base --is-ancestor "$PREV_STABLE" "$t"; then
              BETA_TAGS+=("$t")
            fi
          done

          if [ "${#BETA_TAGS[@]}" -eq 0 ]; then
            echo "_No beta pre-releases found in this range; edit the draft release body as needed._" >> "$NOTES_FILE"
          fi

          PREV_REF="${PREV_STABLE:-}"
          for t in "${BETA_TAGS[@]}"; do
            echo "## ${t}" >> "$NOTES_FILE"
            BODY=$(gh release view "$t" --json body -q .body 2>/dev/null || true)
            if [ -n "$(printf '%s' "$BODY" | tr -d '[:space:]')" ]; then
              printf '%s\n\n' "$BODY" >> "$NOTES_FILE"
            else
              if [ -n "$PREV_REF" ]; then
                git log "${PREV_REF}..${t}" --pretty="- %s (%h)" >> "$NOTES_FILE" || true
              else
                git log "$t" -50 --first-parent --pretty="- %s (%h)" >> "$NOTES_FILE" || true
              fi
              echo "" >> "$NOTES_FILE"
            fi
            PREV_REF="$t"
          done

          echo "path=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create and push Git tag
        if: steps.gate.outputs.should_build == 'true'
        run: |
          set -euo pipefail
          TAG="${{ steps.gate.outputs.tag }}"
          git tag "$TAG"
          git push origin "refs/tags/${TAG}"

      - name: Upload APK — beta pre-release
        if: steps.gate.outputs.should_build == 'true' && steps.gate.outputs.release_kind == 'beta'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.gate.outputs.tag }}
          prerelease: true
          draft: false
          body_path: ${{ steps.notes_beta.outputs.path }}
          files: proxdroid-${{ steps.gate.outputs.tag }}.apk

      - name: Upload APK — stable draft (latest on publish)
        if: steps.gate.outputs.should_build == 'true' && steps.gate.outputs.release_kind == 'stable'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.gate.outputs.tag }}
          prerelease: false
          draft: true
          # make_latest has no effect while draft; GitHub applies latest when the draft is published.
          make_latest: true
          body_path: ${{ steps.notes_stable.outputs.path }}
          files: proxdroid-${{ steps.gate.outputs.tag }}.apk

      - name: Remove signing artifacts from runner
        if: always()
        run: |
          set -euo pipefail
          rm -f android/proxdroid-release.jks android/key.properties
