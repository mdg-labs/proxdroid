# Release APK on prerelease-style tags only. Uses GITHUB_TOKEN (default) with contents: write.
# Stable semver tags like v1.0.0 do NOT match these globs and will not run this workflow until
# you add broader patterns (e.g. 'v*') and decide draft/prerelease behavior for stable releases.
# If you ever need a draft release first, set draft: true on softprops/action-gh-release.

name: Build release APK

on:
  push:
    tags:
      # Tag name glob patterns (evaluated against the pushed tag; see GitHub Actions filter cheat sheet).
      - 'v*-beta*'
      - 'v*-dev*'

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter gen-l10n
      - run: flutter build apk --release

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: build/app/outputs/flutter-apk/app-release.apk
